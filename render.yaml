services:
  - type: web
    name: market-insight-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
